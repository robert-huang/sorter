# Build + deploy the Vite app to GitHub Pages on every push to main.
# Uses GitHub's first-party Pages actions — no gh-pages branch, no
# committed dist/. Repo Pages source must be set to "GitHub Actions"
# under Settings → Pages.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Manual re-runs from the Actions tab.
  workflow_dispatch:

# Pages deploy needs id-token: write (for the OIDC handshake) and
# pages: write (to publish). contents: read covers the checkout.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one in-flight deploy at a time; queue further pushes.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          # Current LTS as of Oct 2024. App has no specific Node
          # requirement; bumping with the action runtimes keeps
          # everything on one supported major.
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      # Sanity gate — keeps the deploy green only when tests pass.
      - run: npm test

      # `vite build` outputs to dist/. base: './' in vite.config.ts means
      # the bundle works under any subpath, including /sorter/.
      #
      # VITE_GOOGLE_CLIENT_ID + VITE_GOOGLE_CLIENT_SECRET are the OAuth
      # credentials for cloud backup. Both end up inlined into the
      # deployed JS bundle — Google's "Web application" client type is
      # classified as confidential and rejects PKCE token exchange
      # without a client_secret, so the browser code has to send both.
      # That makes the "secret" not literally secret here, but we still
      # keep both out of the source tree so forkers don't quietly
      # consume the project's Google API quota / consent screen. The
      # real anti-phishing defense is the Authorized redirect URIs
      # allowlist on the Google Cloud Console side — a stolen id+secret
      # can only redirect to URLs we've explicitly registered.
      #
      # If either repo secret is unset, ${{ secrets.X }} resolves to ''
      # and the deployed app falls back to its "not configured" banner;
      # everything except cloud backup still works.
      - run: npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_GOOGLE_CLIENT_SECRET: ${{ secrets.VITE_GOOGLE_CLIENT_SECRET }}

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
