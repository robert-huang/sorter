<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AniList sign-in</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 2rem;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <p id="status">Completing AniList sign-in…</p>
    <script>
      (function () {
        var MESSAGE_TYPE = 'anilist-oauth-callback';
        var status = document.getElementById('status');
        var query = window.location.search.startsWith('?')
          ? window.location.search.slice(1)
          : window.location.search;
        var queryParams = new URLSearchParams(query);
        var authCode = queryParams.get('code');
        var error = queryParams.get('error') || queryParams.get('error_description');
        var stateRaw = queryParams.get('state');

        // Legacy implicit-grant fallback (hash fragment).
        var hash = window.location.hash.startsWith('#')
          ? window.location.hash.slice(1)
          : window.location.hash;
        var hashParams = new URLSearchParams(hash);
        var accessToken = hashParams.get('access_token');
        if (!error) {
          error = hashParams.get('error') || hashParams.get('error_description');
        }
        if (!stateRaw) {
          stateRaw = hashParams.get('state');
        }

        var targetOrigin = null;
        var nonce = null;

        if (stateRaw) {
          try {
            var padded = stateRaw.replace(/-/g, '+').replace(/_/g, '/');
            while (padded.length % 4 !== 0) {
              padded += '=';
            }
            var state = JSON.parse(atob(padded));
            targetOrigin = state.origin;
            nonce = state.nonce;
          } catch (e) {
            /* ignore malformed state */
          }
        }

        var payload = {
          type: MESSAGE_TYPE,
          accessToken: accessToken,
          authCode: authCode,
          error: error,
          nonce: nonce,
        };

        if (window.opener && targetOrigin) {
          window.opener.postMessage(payload, targetOrigin);
          status.textContent = 'Signed in — you can close this window.';
          window.setTimeout(function () {
            window.close();
          }, 600);
          return;
        }

        if (error) {
          status.textContent = 'Sign-in failed: ' + error;
          return;
        }

        status.textContent =
          'Could not return to the app automatically. Close this window and try again ' +
          '(allow pop-ups, and use the gear menu → Databases → Sign in to AniList).';
      })();
    </script>
  </body>
</html>
